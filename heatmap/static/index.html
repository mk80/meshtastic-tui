<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeshCore RF Heatmap</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <div id="ui-overlay">
        <h1>MeshCore Node Map</h1>
        <div class="stats">
            <p>Nodes Mapped: <span id="node-count">0</span></p>
            <p>🗼 Repeaters: <span id="repeater-count">0</span> &nbsp;|&nbsp; 👤 Users: <span id="user-count">0</span></p>
            <p id="extra-counts" style="display:none; font-size: 0.95rem; color: #aaa;"></p>
            <p>GPS Status: <span id="gps-status" style="color: #ffaa00;">Searching...</span></p>
            <p class="subtitle">Live from your MeshCore Radio</p>
        </div>
    </div>
    <div id="map"></div>

    <!-- Node Legend -->
    <div id="node-legend">
        <div class="legend-title">Node Types</div>
        <div class="legend-icons">
            <span>📍 You</span>
            <span>🗼 Repeater</span>
            <span>👤 User</span>
            <span>💬 Room</span>
            <span>🌡️ Sensor</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- App Logic -->
    <script src="/static/app.js"></script>
</body>
</html>
